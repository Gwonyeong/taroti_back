<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaroTI - {{CONTENT_TYPE}} 마무리</title>
    <link
      href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff"
      rel="preload"
      as="font"
      type="font/woff"
      crossorigin
    />
    <style>
        @font-face {
            font-family: "GowunDodum";
            src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff")
                format("woff");
            font-weight: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "GowunDodum", -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, "Helvetica Neue", Arial, sans-serif;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            position: relative;
            background-image: url('http://localhost:5002/public/ending.png');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 2;
        }

        .logo {
            font-size: 72px;
            font-weight: bold;
            color: white;
            margin-bottom: 40px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .content-type-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .ending-message {
            font-size: 36px;
            line-height: 1.8;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 50px 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 900px;
            margin-bottom: 60px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .cards-summary {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px 50px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 50px;
            max-width: 800px;
        }

        .cards-title {
            font-size: 32px;
            font-weight: bold;
            color: white;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .cards-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            font-size: 24px;
            color: white;
        }

        .card-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .cta-section {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px 50px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .cta-title {
            font-size: 42px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .cta-text {
            font-size: 32px;
            color: white;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            line-height: 1.5;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            color: white;
            opacity: 0.8;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* 반짝이는 효과 */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #FFD700;
            border-radius: 50%;
            animation: sparkle 3s infinite;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1) rotate(180deg);
            }
        }

        .sparkle:nth-child(1) {
            top: 10%;
            left: 15%;
            animation-delay: 0s;
        }
        .sparkle:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 0.7s;
        }
        .sparkle:nth-child(3) {
            bottom: 25%;
            left: 8%;
            animation-delay: 1.4s;
        }
        .sparkle:nth-child(4) {
            bottom: 15%;
            right: 20%;
            animation-delay: 2.1s;
        }
        .sparkle:nth-child(5) {
            top: 45%;
            left: 3%;
            animation-delay: 0.3s;
        }
        .sparkle:nth-child(6) {
            top: 55%;
            right: 5%;
            animation-delay: 1.1s;
        }
        .sparkle:nth-child(7) {
            top: 35%;
            left: 90%;
            animation-delay: 1.8s;
        }
        .sparkle:nth-child(8) {
            bottom: 45%;
            right: 85%;
            animation-delay: 2.5s;
        }
    </style>
</head>
<body>
    <!-- 반짝이는 배경 효과 -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="overlay"></div>

    <div class="container">
        <div class="logo">TaroTI</div>

        <div class="content-type-title">{{CONTENT_TYPE}}</div>

        <div class="ending-message">
            콘텐츠 이미지 두번 클릭 후,<br />
            카드에 대한 의견을 댓글로 남기면<br />
            행운이 찾아와요! ✨
        </div>

        <div class="cards-summary">
            <div class="cards-title">🔮 이번에 선택된 카드들</div>
            <div class="cards-list">
                {{SELECTED_CARDS_HTML}}
            </div>
        </div>

        <div class="cta-section">
            <div class="cta-title">{{CTA_TITLE}}</div>
            <div class="cta-text">
                {{CTA_MESSAGE}}
            </div>
        </div>

        <div class="footer">@taroti_official • {{FOOTER_TEXT}}</div>
    </div>
</body>
</html>
