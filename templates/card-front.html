<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 앞면</title>
    <link
      href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff"
      rel="preload"
      as="font"
      type="font/woff"
      crossorigin
    />
    <style>
        @font-face {
            font-family: "GowunDodum";
            src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff")
                format("woff");
            font-weight: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "GowunDodum", -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, "Helvetica Neue", Arial, sans-serif;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            position: relative;
            background: #000000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('http://localhost:5002/public/ending.png') center/cover;
            opacity: 0.3;
            z-index: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 700px;
            margin: 0 auto 40px auto;
            justify-items: center;
        }

        .card-container {
            position: relative;
            width: 280px;
            height: 400px;
            margin: 0 auto;
        }

        .card-front {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 17px;
        }

        .card-name-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .title {
            font-size: 56px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            white-space: pre-line;
        }

        .subtitle {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* 반짝이는 효과 */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: sparkle 3s infinite;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .sparkle:nth-child(1) {
            top: 15%;
            left: 20%;
            animation-delay: 0s;
        }
        .sparkle:nth-child(2) {
            top: 25%;
            right: 15%;
            animation-delay: 1s;
        }
        .sparkle:nth-child(3) {
            bottom: 30%;
            left: 10%;
            animation-delay: 2s;
        }
        .sparkle:nth-child(4) {
            bottom: 20%;
            right: 25%;
            animation-delay: 0.5s;
        }
        .sparkle:nth-child(5) {
            top: 50%;
            left: 5%;
            animation-delay: 1.5s;
        }
        .sparkle:nth-child(6) {
            top: 60%;
            right: 8%;
            animation-delay: 2.5s;
        }
    </style>
</head>
<body>
    <!-- 반짝이는 배경 효과 -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="overlay"></div>

    <div class="container">
        <h1 class="title">{{TITLE}}</h1>
        <p class="subtitle">선택된 카드 4장</p>

        <div class="cards-grid">
            <!-- 카드 1 앞면 -->
            <div class="card-container">
                <div class="card-front">
                    <img src="{{CARD1_IMAGE}}" alt="{{CARD1_KOREAN_NAME}}" class="card-image">
                    <div class="card-name-overlay">{{CARD1_KOREAN_NAME}}</div>
                </div>
            </div>

            <!-- 카드 2 앞면 -->
            <div class="card-container">
                <div class="card-front">
                    <img src="{{CARD2_IMAGE}}" alt="{{CARD2_KOREAN_NAME}}" class="card-image">
                    <div class="card-name-overlay">{{CARD2_KOREAN_NAME}}</div>
                </div>
            </div>

            <!-- 카드 3 앞면 -->
            <div class="card-container">
                <div class="card-front">
                    <img src="{{CARD3_IMAGE}}" alt="{{CARD3_KOREAN_NAME}}" class="card-image">
                    <div class="card-name-overlay">{{CARD3_KOREAN_NAME}}</div>
                </div>
            </div>

            <!-- 카드 4 앞면 -->
            <div class="card-container">
                <div class="card-front">
                    <img src="{{CARD4_IMAGE}}" alt="{{CARD4_KOREAN_NAME}}" class="card-image">
                    <div class="card-name-overlay">{{CARD4_KOREAN_NAME}}</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
