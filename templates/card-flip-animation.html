<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 뒤집기 애니메이션</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1350px;
            min-height: 1350px;
            background: url('http://localhost:5002/public/ending.png') center/cover;
            background-color: #2C1810; /* 배경 이미지 로딩 전 기본 브라운 색상 */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* 썸네일 인트로 스타일 - 제거됨 (카드 뒷면이 바로 썸네일로 사용되도록) */

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            z-index: 2;
        }

        .title {
            color: white;
            font-size: 56px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            opacity: 1;
            animation: fadeInTitle 0.3s ease-in-out forwards;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            width: 100%;
            max-width: 700px;
        }

        .card-container {
            position: relative;
            width: 280px;
            height: 400px;
            margin: 0 auto;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform-origin: center center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            border: 3px solid #fff;
        }

        .card-back {
            background: url('http://localhost:5002/public/images/cards/camp_band.jpeg') center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 0 1000px rgba(0, 0, 0, 0.5);
        }

        .card-back-pattern {
            width: 180px;
            height: 180px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card-back-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            position: relative;
            z-index: 1;
        }

        .card-front {
            background: white;
            transform: rotateY(180deg);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 17px;
        }

        .footer {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            opacity: 0;
        }

        .footer.show {
            animation: fadeInFooter 1s ease-in-out forwards;
        }

        .ending-message {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            text-align: center;
            opacity: 0;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .ending-message.show {
            animation: fadeInEnding 1s ease-in-out forwards;
        }

        @keyframes fadeInEnding {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 애니메이션 정의 */
        @keyframes fadeInTitle {
            0% {
                opacity: 1;
                transform: translateY(-10px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeInFooter {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 카드별 지연 애니메이션 */
        .card-container:nth-child(1) .card {
            animation-delay: 4.0s;
        }
        .card-container:nth-child(2) .card {
            animation-delay: 4.2s;
        }
        .card-container:nth-child(3) .card {
            animation-delay: 4.4s;
        }
        .card-container:nth-child(4) .card {
            animation-delay: 4.6s;
        }

        /* 반짝이는 효과 */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 다양한 위치에 반짝이는 효과 배치 */
        .sparkle:nth-child(1) {
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }
        .sparkle:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 0.5s;
        }
        .sparkle:nth-child(3) {
            bottom: 30%;
            left: 10%;
            animation-delay: 1s;
        }
        .sparkle:nth-child(4) {
            bottom: 15%;
            right: 25%;
            animation-delay: 1.5s;
        }
        .sparkle:nth-child(5) {
            top: 50%;
            left: 5%;
            animation-delay: 2s;
        }
        .sparkle:nth-child(6) {
            top: 60%;
            right: 8%;
            animation-delay: 2.5s;
        }
    </style>
</head>
<body>
    <!-- 반짝이는 배경 효과 -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <!-- 썸네일 인트로 제거 - 카드 뒷면이 바로 썸네일로 사용됨 -->

    <div class="container">
        <h1 class="title">{{TITLE}}</h1>

        <div class="cards-grid">
            <!-- 카드 1 -->
            <div class="card-container">
                <div class="card" id="card1">
                    <div class="card-face card-back">
                        <div class="card-back-pattern">1번</div>
                        <div class="card-back-text">TAROT</div>
                    </div>
                    <div class="card-face card-front">
                        <img src="{{CARD1_IMAGE}}" alt="카드 {{CARD1_NUMBER}}" class="card-image">
                    </div>
                </div>
            </div>

            <!-- 카드 2 -->
            <div class="card-container">
                <div class="card" id="card2">
                    <div class="card-face card-back">
                        <div class="card-back-pattern">2번</div>
                        <div class="card-back-text">TAROT</div>
                    </div>
                    <div class="card-face card-front">
                        <img src="{{CARD2_IMAGE}}" alt="카드 {{CARD2_NUMBER}}" class="card-image">
                    </div>
                </div>
            </div>

            <!-- 카드 3 -->
            <div class="card-container">
                <div class="card" id="card3">
                    <div class="card-face card-back">
                        <div class="card-back-pattern">3번</div>
                        <div class="card-back-text">TAROT</div>
                    </div>
                    <div class="card-face card-front">
                        <img src="{{CARD3_IMAGE}}" alt="카드 {{CARD3_NUMBER}}" class="card-image">
                    </div>
                </div>
            </div>

            <!-- 카드 4 -->
            <div class="card-container">
                <div class="card" id="card4">
                    <div class="card-face card-back">
                        <div class="card-back-pattern">4번</div>
                        <div class="card-back-text">TAROT</div>
                    </div>
                    <div class="card-face card-front">
                        <img src="{{CARD4_IMAGE}}" alt="카드 {{CARD4_NUMBER}}" class="card-image">
                    </div>
                </div>
            </div>
        </div>

        <div class="footer" id="footer">@taroti_official</div>

        <!-- 엔딩 메시지 -->
        <div class="ending-message" id="endingMessage">
            자세한 내용은 화면을 넘겨 확인!
        </div>
    </div>

    <script>
        // 카드 뒤집기 애니메이션 시작 함수
        function startCardFlipAnimation() {

            // 2초 후에 카드들을 순서대로 뒤집기 (카드 뒷면을 충분히 보여준 후)
            setTimeout(() => {
                document.getElementById('card1').classList.add('flipped');
            }, 2000);

            setTimeout(() => {
                document.getElementById('card2').classList.add('flipped');
            }, 2200);

            setTimeout(() => {
                document.getElementById('card3').classList.add('flipped');
            }, 2400);

            setTimeout(() => {
                document.getElementById('card4').classList.add('flipped');

                // 마지막 카드 뒤집기 후 푸터 표시
                setTimeout(() => {
                    document.getElementById('footer').classList.add('show');

                    // 푸터 표시 후 1초 뒤 엔딩 메시지 표시
                    setTimeout(() => {
                        document.getElementById('endingMessage').classList.add('show');
                    }, 1000);
                }, 800);
            }, 2600);
        }

        // 페이지 로드 완료 후 자동 실행
        window.addEventListener('load', () => {
            // 즉시 애니메이션 시작 (지연 없음)
            startCardFlipAnimation();
        });

        // 전역 함수로 노출 (VideoService에서 호출용)
        window.startCardFlipAnimation = startCardFlipAnimation;
    </script>
</body>
</html>
