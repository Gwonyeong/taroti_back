<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{CARD_NAME}} - 타로 카드 설명</title>
    <link
      href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff"
      rel="preload"
      as="font"
      type="font/woff"
      crossorigin
    />
    <style>
        @font-face {
            font-family: "GowunDodum";
            src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff")
                format("woff");
            font-weight: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "GowunDodum", -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, "Helvetica Neue", Arial, sans-serif;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
            position: relative;
            background: #000000;
            color: white;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('http://localhost:5002/public/ending.png') center/cover;
            opacity: 0.2;
            z-index: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
            padding: 50px;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .content-type {
            font-size: 32px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .card-number {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.8);
        }

        .card-section {
            position: relative;
            flex: 1;
            display: flex;
            align-items: stretch;
            margin-bottom: 80px;
        }

        .content-area {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            padding: 60px 70px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card-image-container {
            position: absolute;
            right: -50px;
            bottom: -30px;
            z-index: 10;
        }

        .card-image {
            width: 240px;
            height: 340px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 4px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
        }

        .card-korean-name {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .description-section {
            margin-bottom: 40px;
            flex: 1;
        }

        .description-title {
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .description-text {
            font-size: 26px;
            line-height: 1.8;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            word-break: keep-all;
        }

        .advice-section {
            background: rgba(255, 215, 0, 0.1);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            margin-bottom: 30px;
            margin-right: 200px;
        }

        .keywords-section {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-right: 200px;
        }

        .keyword {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .footer-text {
            font-size: 24px;
            color: white;
            opacity: 0.8;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* 반짝이는 효과 */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 3s infinite;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .sparkle:nth-child(1) {
            top: 15%;
            left: 20%;
            animation-delay: 0s;
        }
        .sparkle:nth-child(2) {
            top: 25%;
            right: 15%;
            animation-delay: 1s;
        }
        .sparkle:nth-child(3) {
            bottom: 30%;
            left: 10%;
            animation-delay: 2s;
        }
        .sparkle:nth-child(4) {
            bottom: 20%;
            right: 25%;
            animation-delay: 0.5s;
        }
        .sparkle:nth-child(5) {
            top: 50%;
            left: 5%;
            animation-delay: 1.5s;
        }
        .sparkle:nth-child(6) {
            top: 60%;
            right: 8%;
            animation-delay: 2.5s;
        }
    </style>
</head>
<body>
    <!-- 반짝이는 배경 효과 -->
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="overlay"></div>

    <div class="container">
        <div class="header">
            <div class="content-type">{{CONTENT_TYPE}}</div>
            <div class="card-number">{{CARD_INDEX}}/4</div>
        </div>

        <div class="card-section">
            <div class="content-area">
                <div class="card-image-container">
                    <img src="{{CARD_IMAGE}}" alt="{{CARD_KOREAN_NAME}}" class="card-image">
                </div>
                <div class="card-korean-name">{{CARD_KOREAN_NAME}}</div>

                <div class="description-section">
                    <div class="description-title">{{MAIN_DESCRIPTION_TITLE}}</div>
                    <div class="description-text">{{MAIN_DESCRIPTION}}</div>
                </div>

                <div class="advice-section">
                    <div class="description-title">💡 조언</div>
                    <div class="description-text">{{ADVICE_TEXT}}</div>
                </div>

                <div class="keywords-section">
                    {{KEYWORDS_HTML}}
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-text">@taroti_official</div>
        </div>
    </div>
</body>
</html>
